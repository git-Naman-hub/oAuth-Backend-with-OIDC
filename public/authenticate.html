<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignIn</title>

    <style>
        body {
          margin: 0;
          font-family: Arial, sans-serif;
          background-color: #0f172a;
          color: #e5e7eb;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
        }
      
        .container {
          background: #1e293b;
          padding: 30px;
          border-radius: 12px;
          width: 350px;
          box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
      
        h1 {
          text-align: center;
          margin-bottom: 10px;
        }
      
        .subtitle {
          text-align: center;
          font-size: 14px;
          color: #94a3b8;
          margin-bottom: 20px;
        }
      
        .form {
          display: flex;
          flex-direction: column;
        }
      
        .field {
          display: flex;
          flex-direction: column;
          margin-bottom: 15px;
        }
      
        .field-row {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 5px;
        }
      
        label {
          font-size: 14px;
          color: #cbd5f5;
        }
      
        input {
          padding: 10px;
          border-radius: 6px;
          border: 1px solid #334155;
          background: #0f172a;
          color: #e5e7eb;
          outline: none;
          transition: border 0.2s ease;
        }
      
        input:focus {
          border-color: #6366f1;
        }
      
        input::placeholder {
          color: #64748b;
        }
      
        .forgot {
          font-size: 12px;
          color: #6366f1;
          text-decoration: none;
        }
      
        .forgot:hover {
          text-decoration: underline;
        }
      
        button {
          width: 100%;
          padding: 12px;
          border: none;
          border-radius: 6px;
          background: #6366f1;
          color: white;
          font-size: 15px;
          cursor: pointer;
          transition: background 0.2s ease;
        }
      
        button:hover {
          background: #4f46e5;
        }
      
        button:active {
          transform: scale(0.98);
        }
      </style>
</head>
<body>
    <div class="container">
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to your account to continue</p>
        <form action="/auth/sign-in" method="post" class="form">
            <div class="field">
                <label for="email">Email</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="you@example.com"
                  required
                />
              </div>
              <div class="field">
                <div class="field-row">
                  <label for="password">Password</label>
                  <a href="#" class="forgot">Forgot password?</a>
                </div>
                <input
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="••••••••"
                  required
                />
              </div>
              <button type="submit" id="submitBtn">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Sign in</span>
              </button>
        
        </form>

    </div>
</body>
</html>
